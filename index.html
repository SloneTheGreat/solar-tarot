<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿼카의 태양계 운세</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: #e0e0e0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        .container {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.8s forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* 인트로 화면 */
        #intro-screen h1 { font-size: 1.8rem; margin-bottom: 20px; color: #ffd700; }
        #daily-message {
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 30px;
            color: #b0c4de;
            min-height: 90px;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 15px;
            word-break: keep-all;
        }

        /* 카피라이트 스타일 */
        .copyright {
            margin-top: 30px;
            font-size: 0.85rem;
        }
        .copyright a {
            color: #888;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .copyright a:hover {
            color: #87cefa;
        }

        /* 로딩 화면 */
        #loading-screen .breathing-text {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #87cefa;
            animation: breathe 3s infinite ease-in-out;
        }
        @keyframes breathe {
            0%   { transform: scale(0.95); opacity: 0.6; }
            50%  { transform: scale(1.05); opacity: 1; text-shadow: 0 0 15px rgba(135,206,250,0.8); }
            100% { transform: scale(0.95); opacity: 0.6; }
        }

        /* 결과 화면 - 카드 */
        .cards-wrapper {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .card {
            width: 140px;
            height: 200px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: slideUp 0.6s forwards;
            opacity: 0;
        }
        .card:nth-child(2) { animation-delay: 0.25s; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .card .emoji { font-size: 3.5rem; margin-bottom: 10px; }
        .card .name  { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        .card .type  { font-size: 0.75rem; color: #a9a9a9; }

        #result-screen .theme-title {
            font-size: 1.4rem; color: #ffd700; margin-bottom: 15px;
        }
        #result-screen .fortune-text {
            font-size: 1rem; line-height: 1.6; color: #e0e0e0;
            margin-bottom: 30px; text-align: left;
            background: rgba(0,0,0,0.3); padding: 20px;
            border-radius: 10px; word-break: keep-all;
        }

        /* 버튼 기본 공통 스타일 */
        button {
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            font-size: 1.1rem;
            padding: 15px 30px;
        }
        button:hover {
            transform: translateY(-2px);
        }
        
        /* 버튼 색상 개별 지정 */
        .btn-primary {
            background: linear-gradient(45deg, #4b0082, #00008b);
        }
        .btn-primary:hover {
            background: linear-gradient(45deg, #5a009d, #0000a8);
            box-shadow: 0 6px 20px rgba(75,0,130,0.6);
        }
        
        .btn-secondary {
            background: linear-gradient(45deg, #2b5876, #4e4376);
            font-size: 1rem;
            padding: 15px 20px;
        }
        .btn-secondary:hover {
            background: linear-gradient(45deg, #3b749a, #65569a);
            box-shadow: 0 6px 20px rgba(78, 67, 118, 0.6);
        }

        /* 결과 화면 하단 버튼 그룹 */
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<div class="container">

    <!-- ① 인트로 화면 -->
    <div id="intro-screen">
        <h1>🐿️ 쿼카의 태양계 운세 🌌</h1>
        <div id="daily-message"></div>
        <button id="start-btn" class="btn-primary" onclick="startFortune()">운세 뽑기 ✨</button>
        
        <!-- 카피라이트 및 블로그 링크 -->
        <div class="copyright">
            <a href="https://blog.naver.com/legalhomebody" target="_blank">ⓒ 2026. 쿼카타임즈 All rights reserved.</a>
        </div>
    </div>

    <!-- ② 심호흡 로딩 화면 -->
    <div id="loading-screen" class="hidden">
        <div class="breathing-text">
            태양계의 기운이<br>당신에게 오고 있습니다.<br><br>
            심호흡을 한번 하고<br>마음을 가다듬어 주세요...
        </div>
    </div>

    <!-- ③ 결과 화면 -->
    <div id="result-screen" class="hidden">
        <h2 style="font-size:1.1rem; color:#87cefa; margin-bottom:15px;">오늘의 천체 카드 조합</h2>
        <div class="cards-wrapper">
            <div class="card">
                <div class="emoji" id="inner-emoji"></div>
                <div class="name"  id="inner-name"></div>
                <div class="type">나의 대처 (내행성)</div>
            </div>
            <div class="card">

                <div class="name"  id="outer-name"></div>
                <div class="type">오늘의 환경 (외행성)</div>
            </div>
        </div>
        <div class="theme-title" id="fortune-theme"></div>
        <div class="fortune-text" id="fortune-desc"></div>
        
        <!-- 버튼 2개 나란히 배치 -->
        <div class="button-group">
            <button class="btn-primary" onclick="resetFortune()" style="font-size: 1rem; padding: 15px 20px;">다시 뽑기 🔄</button>
            <!-- 버튼명 변경 및 이동 함수 연결 -->
            <button class="btn-secondary" onclick="goToOtherFortune()">다른 운세 보기 🔮</button>
        </div>
    </div>

</div>

    "금성-목성": { theme: "풍요로운 사랑", desc: "당신을 아끼는 사람의 든든한 지원이 쏟아집니다. 인연과 창작 활동 모두 풍성한 결실을 맺을 수 있는 하루입니다." },

    "금성-천왕성": { theme: "예상치 못한 설렘", desc: "전혀 예상치 못한 장소, 전혀 뜻밖의 사람으로부터 마음이 흔들리는 사건이 발생합니다. 열린 마음으로 새로운 만남을 맞이하세요." },

    "지구-태양": { theme: "생명의 기반", desc: "모든 것이 제자리에 있는 평온한 날입니다. 일상의 루틴을 믿고 그대로 실행하세요. 특별할 것 없어 보이는 오늘이 가장 완벽한 하루입니다." },

    "지구-천왕성": { theme: "지각 변동", desc: "당신의 일상과 안정을 뒤흔드는 변화의 바람이 불어옵니다. 저항하면 더 큰 충격이 오니 유연하게 흐름에 몸을 맡기세요." },
    "지구-해왕성": { theme: "현실 속의 꿈", desc: "현실 위에 꿈이 떠 있는 날입니다. 목표가 현실적인 발판 위에 있는지 점검하세요. 발이 땅을 완전히 떠나는 것은 위험합니다." },
    "지구-명왕성": { theme: "깊은 땅속의 변화", desc: "느리지만 근본적인 변화가 내면에서 일어나고 있습니다. 지금 불편하게 느껴지는 상황이 사실 새로운 시작을 위한 준비임을 깨달으세요." },
    "달-태양": { theme: "일식과 보름달", desc: "내면의 감정과 외부의 상황이 완벽하게 일치하는 강력한 날입니다. 오랫동안 갈망했던 것을 오늘 선언하세요. 우주가 당신의 편입니다." },
