window.onload = function() {
    const today = new Date();
    const days = ['일','월','화','수','목','금','토'];
    document.getElementById('daily-message').innerHTML = `오늘은 ${today.getMonth()+1}월 ${today.getDate()}일 ${days[today.getDay()]}요일입니다. 🌙<br>우주는 오늘도 조용히 당신 곁에서 돌고 있습니다.<br><br>행복한 쿼카의 태양계 운세로 오늘 하루를 시작해보세요. 🐿️`;
};

let shuffleTimer;
function startFortune() {
    document.getElementById('intro-screen').classList.add('hidden');
    document.getElementById('loading-screen').classList.remove('hidden');
    
    const deck = document.getElementById('shuffle-deck');
    deck.innerHTML = '';
    const cards = [];
    
    for(let i=0; i<5; i++) {
        let c = document.createElement('div');
        c.className = 'shuffle-card';
        deck.appendChild(c);
        cards.push(c);
    }

    let count = 0;
    shuffleTimer = setInterval(() => {
        cards.forEach(c => {
            const rx = (Math.random() - 0.5) * 120;
            const ry = (Math.random() - 0.5) * 60;
            const rDeg = (Math.random() - 0.5) * 90;
            c.style.transform = `translate(${rx}px, ${ry}px) rotate(${rDeg}deg)`;
            c.style.zIndex = Math.floor(Math.random() * 10);
            c.innerText = allEmojis[Math.floor(Math.random() * allEmojis.length)];
        });
        count++;
        if(count > 18) {
            clearInterval(shuffleTimer);
            cards.forEach(c => { c.style.transform = 'translate(0px, 0px) rotate(0deg)'; });
        }
    }, 500);

    setTimeout(showResult, 10000);
}

function showResult() {
    document.getElementById('loading-screen').classList.add('hidden');
    const inner = innerPlanets[Math.floor(Math.random() * innerPlanets.length)];
    const outer = outerPlanets[Math.floor(Math.random() * outerPlanets.length)];
    const key = `${inner.name}-${outer.name}`;
    
    const resultData = fortuneDB[key] || { 
        theme:"신비로운 교차점", 
        desc:"우주의 지혜를 발견하는 날입니다.",
        url: "https://blog.naver.com/legalhomebody" 
    };
    
    document.getElementById('inner-emoji').innerText = inner.emoji;
    document.getElementById('inner-name').innerText = inner.name;
    document.getElementById('outer-emoji').innerText = outer.emoji;
    document.getElementById('outer-name').innerText = outer.name;
    document.getElementById('fortune-theme').innerText = `"${resultData.theme}"`;
    document.getElementById('fortune-desc').innerText = resultData.desc;
    
    document.getElementById('detail-btn').href = resultData.url;
    document.getElementById('result-screen').classList.remove('hidden');
}

function resetFortune() {
    document.getElementById('result-screen').classList.add('hidden');
    document.getElementById('intro-screen').classList.remove('hidden');
}
</script>
