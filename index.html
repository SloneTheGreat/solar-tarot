<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>태양계 운세</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: #e0e0e0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        .container {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.8s forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* 인트로 화면 */
        #intro-screen h1 { font-size: 1.8rem; margin-bottom: 20px; color: #ffd700; }
        #daily-message {
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 30px;
            color: #b0c4de;
            min-height: 90px;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 15px;
            word-break: keep-all;
        }
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }

        /* 로딩 화면 */
        #loading-screen .breathing-text {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #87cefa;
            animation: breathe 3s infinite ease-in-out;
        }
        @keyframes breathe {
            0%   { transform: scale(0.95); opacity: 0.6; }
            50%  { transform: scale(1.05); opacity: 1; text-shadow: 0 0 15px rgba(135,206,250,0.8); }
            100% { transform: scale(0.95); opacity: 0.6; }
        }

        /* 결과 화면 - 카드 */
        .cards-wrapper {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .card {
            width: 140px;
            height: 200px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: slideUp 0.6s forwards;
            opacity: 0;
        }
        .card:nth-child(2) { animation-delay: 0.25s; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .card .emoji { font-size: 3.5rem; margin-bottom: 10px; }
        .card .name  { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        .card .type  { font-size: 0.75rem; color: #a9a9a9; }

        #result-screen .theme-title {
            font-size: 1.4rem; color: #ffd700; margin-bottom: 15px;
        }
        #result-screen .fortune-text {
            font-size: 1rem; line-height: 1.6; color: #e0e0e0;
            margin-bottom: 30px; text-align: left;
            background: rgba(0,0,0,0.3); padding: 20px;
            border-radius: 10px; word-break: keep-all;
        }

        /* 버튼 */
        button {
            background: linear-gradient(45deg, #4b0082, #00008b);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(75,0,130,0.6);
        }
        button:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.6;
        }
    </style>
</head>

// ④ AI 오늘의 멘트 생성 (클라우드플레어 워커 경유)
// ============================================================
async function fetchDailyMessage() {
    const messageEl = document.getElementById('daily-message');
    const btnEl     = document.getElementById('start-btn');

    const today  = new Date();
    const days   = ['일','월','화','수','목','금','토'];
    const months = today.getMonth() + 1;
    const date   = today.getDate();
    const day    = days[today.getDay()];

    // 계절 판단
    const season =
        months >= 3 && months <= 5 ? "봄" :
        months >= 6 && months <= 8 ? "여름" :
        months >= 9 && months <= 11 ? "가을" : "겨울";

    const dateStr = `${today.getFullYear()}년 ${months}월 ${date}일 ${day}요일 (${season})`;

    const promptText = `당신은 '태양계 운세 서비스'의 다정하고 따뜻한 가이드입니다.
오늘 날짜는 ${dateStr}입니다. 한국의 계절감과 오늘의 요일 특성을 반영하여 앱에 접속한 사용자에게 위로와 격려가 되는 감성적인 오프닝 인사말을 작성해주세요.
[규칙]
1. 공백 포함 100자~150자 내외, 3문장 이내.
2. 마지막 문장은 반드시 정확하게 "태양계 운세로 오늘 하루를 시작해보세요."로 끝낼 것.
3. 이모지를 1~2개 자연스럽게 포함할 것.`;

    try {
        const response = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: promptText })
        });

        if (!response.ok) throw new Error("워커 응답 오류");

        const data   = await response.json();
        let aiText   = data.candidates[0].content.parts[0].text.trim();
        aiText       = aiText.replace(/\n/g, '<br>');
        messageEl.innerHTML = aiText;

    } catch (error) {
        console.error("AI 멘트 생성 오류:", error);
        // API 실패 시 날짜 기반 폴백 메시지
        messageEl.innerHTML =
            `오늘은 ${months}월 ${date}일 ${day}요일입니다. 🌙<br>
             우주는 오늘도 조용히 당신 곁에서 돌고 있습니다.<br><br>
             태양계 운세로 오늘 하루를 시작해보세요.`;
    } finally {
        btnEl.disabled = false; // AI 응답 후 버튼 활성화
    }
}

// ============================================================
// ⑤ 화면 전환 로직
// ============================================================
function startFortune() {
    document.getElementById('intro-screen').classList.add('hidden');
    const loadingScreen = document.getElementById('loading-screen');
    loadingScreen.classList.remove('hidden');
    loadingScreen.classList.add('fade-in');

    setTimeout(showResult, 3500); // 3.5초 심호흡 후 결과 표시
}

function showResult() {
    document.getElementById('loading-screen').classList.add('hidden');

    // 랜덤 천체 뽑기
    const inner = innerPlanets[Math.floor(Math.random() * innerPlanets.length)];
    const outer = outerPlanets[Math.floor(Math.random() * outerPlanets.length)];
    const key   = `${inner.name}-${outer.name}`;

    const resultData = fortuneDB[key] || {
        theme: "우주의 신비로운 교차점",
        desc:  `${inner.name}의 기운과 ${outer.name}의 에너지가 만납니다. 예상치 못한 곳에서 우주의 지혜를 발견할 수 있는 하루입니다.`
    };

    document.getElementById('inner-emoji').innerText  = inner.emoji;
    document.getElementById('inner-name').innerText   = inner.name;
    document.getElementById('outer-emoji').innerText  = outer.emoji;
    document.getElementById('outer-name').innerText   = outer.name;
    document.getElementById('fortune-theme').innerText = `"${resultData.theme}"`;
    document.getElementById('fortune-desc').innerText  = resultData.desc;

    const resultScreen = document.getElementById('result-screen');
    resultScreen.classList.remove('hidden');
    resultScreen.classList.add('fade-in');
}

function resetFortune() {
    document.getElementById('result-screen').classList.add('hidden');
    const introScreen = document.getElementById('intro-screen');
    introScreen.classList.remove('hidden');
    introScreen.classList.add('fade-in');
}

// ============================================================
// ⑥ 앱 시작
// ============================================================
window.onload = fetchDailyMessage;
</script>
